<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXCH365 Wallet</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#2563eb);
color:white;
}

h1{
text-align:center;
margin-bottom:25px;
}

.wallet{
background:linear-gradient(135deg,#2563eb,#1e40af);
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.wallet h2{
margin:0;
font-size:22px;
}

.balance{
font-size:40px;
margin-top:10px;
font-weight:bold;
}

.plan-box{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
margin-top:12px;
}

button:hover{
background:#1d4ed8;
}

.note{
margin-top:10px;
font-size:14px;
color:#cbd5e1;
}

</style>
</head>

<body>

<h1>EXCH365 Wallet</h1>

<div class="wallet">

<h2>Total Wallet Balance</h2>

<div class="balance" id="balance">
₹0
</div>

</div>

<div class="plan-box">

<h2>Add Balance</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="addMoney()">
Add Money
</button>

</div>

<div class="plan-box">

<h2>Withdraw Money</h2>

<input type="number" id="withdrawAmount" placeholder="Enter Withdraw Amount">

<button onclick="withdrawMoney()">
Withdraw
</button>

<div class="note">
Minimum Withdrawal ₹210 <br>
3% Charge on Every Withdrawal
</div>

</div>

<script>

let balance = localStorage.getItem("wallet");

if(balance == null){
balance = 0;
}else{
balance = parseFloat(balance);
}

document.getElementById("balance").innerText =
"₹" + balance.toFixed(2);

function addMoney(){

let amount =
document.getElementById("amount").value;

if(amount == ""){
alert("Enter Amount");
return;
}

amount = parseFloat(amount);

balance = balance + amount;

localStorage.setItem("wallet", balance);

document.getElementById("balance").innerText =
"₹" + balance.toFixed(2);

alert("Money Added Successfully");

}

function withdrawMoney(){

let amount =
document.getElementById("withdrawAmount").value;

if(amount == ""){
alert("Enter Withdraw Amount");
return;
}

amount = parseFloat(amount);

if(amount < 210){

alert("Minimum Withdrawal ₹210");

return;

}

let charge = (amount * 3) / 100;

let totalDeduct = amount + charge;

if(totalDeduct > balance){

alert("Insufficient Balance");

return;

}

balance = balance - totalDeduct;

localStorage.setItem("wallet", balance);

document.getElementById("balance").innerText =
"₹" + balance.toFixed(2);

alert(
"Withdrawal Successful\n\n" +
"Withdrawal Amount: ₹" + amount.toFixed(2) +
"\nCharge: ₹" + charge.toFixed(2) +
"\nTotal Deducted: ₹" + totalDeduct.toFixed(2)
);

}

</script>

</body>
</html>
