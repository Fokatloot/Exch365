<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXCH365 OTP Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#2563eb);
}

.container{
width:320px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>EXCH365</h1>

<input type="tel" id="phone"
placeholder="+91XXXXXXXXXX">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">
Send OTP
</button>

<input type="text" id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAktq4I9G4zW5lqZ9lGNVh3PkRjvWWlx_w",

authDomain: "exch365-e2535.firebaseapp.com",

databaseURL:
"https://exch365-e2535-default-rtdb.firebaseio.com",

projectId: "exch365-e2535",

storageBucket:
"exch365-e2535.firebasestorage.app",

messagingSenderId: "730989026832",

appId:
"1:730989026832:web:26d83555e7686ed0f6b495",

measurementId: "G-4T1CB6EHDD"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.recaptchaVerifier =
new RecaptchaVerifier(
auth,
"recaptcha-container",
{
size:"normal"
}
);

window.sendOTP = function(){

let phone =
document.getElementById("phone").value;

signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
)

.then((confirmationResult)=>{

window.confirmationResult =
confirmationResult;

alert("OTP Sent Successfully");

})

.catch((error)=>{

alert(error.message);

});

}

window.verifyOTP = function(){

let otp =
document.getElementById("otp").value;

confirmationResult.confirm(otp)

.then(()=>{

alert("Login Successful");

window.location.href =
"dashboard.html";

})

.catch(()=>{

alert("Invalid OTP");

});

}

</script>

</body>
</html>
