<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXCH365</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#2563eb);
}

.container{
width:320px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

.register{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<h1>EXCH365</h1>

<input type="tel" id="mobile" placeholder="Mobile Number">

<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<button class="register" onclick="registerUser()">Register</button>

</div>

<script src="app.js"></script>

</body>
</html>
